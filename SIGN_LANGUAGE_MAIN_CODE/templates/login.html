<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>Sign Language Detection</title>

        <!-- CSS FILES -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
        <link href="../static/css/bootstrap.min.css" rel="stylesheet">
        <link href="../static/css/bootstrap-icons.css" rel="stylesheet">
        <link rel="stylesheet" href="../static/css/slick.css"/>
        <link href="../static/css/tooplate-little-fashion.css" rel="stylesheet">

        <style>
            body {
                background-image: linear-gradient(rgba(0,0,0,0.2),rgba(0,0,0,0.2)),url('../static/2.jpg'); 
                background-size: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                background-position: center;
            }

            .login-container {
                display: flex;
                justify-content: flex-end;
                height: 100vh;
                align-items: center;
                padding-right: 10%;
            }

            .login-box {
                width: 350px;
                background: rgba(255, 255, 255, 0.1);
                padding: 30px;
                border-radius: 10px;
                backdrop-filter: blur(5px);
            }

            .login-box h1 {
                color: white;
                text-align: center;
            }

            .form-floating input {
                background: rgba(255, 255, 255, 0.2);
                color: white;
            }

            .form-floating input::placeholder {
                color: white;
            }

            .custom-btn {
                background-color: #ff7f50;
                border: none;
                color: white;
                font-weight: bold;
            }

            .custom-btn:hover {
                background-color: #ff5733;
            }
        </style>
    </head>

    <body>
        <main class="login-container">
            <div class="login-box">
                <h1>Log In</h1>
                <form role="form" method="post" action="/login">
                    <div class="form-floating mb-4">
                        <input type="text" name="email" id="email" class="form-control" placeholder="Username" required>
                        <label for="email">Email</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>

                    <button type="submit" class="btn custom-btn form-control mt-4 mb-3">Log in</button>

                    <p class="text-center" style="color:white">Please provide your <a href="#" style="color: white;">credentials</a></p>
                </form>
            </div>
        </main>
        <script src="../static/js/jquery.min.js"></script>
        <script src="../static/js/bootstrap.bundle.min.js"></script>
        <script src="../static/js/Headroom.js"></script>
        <script src="../static/js/jQuery.headroom.js"></script>
        <script src="../static/js/slick.min.js"></script>
        <script src="../static/js/custom.js"></script>
    </body>
</html>
